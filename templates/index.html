<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Agent — Bring Your Drawing to Life</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --accent: #7c3aed;
    --accent2: #06b6d4;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --card: #1a1a24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124,58,237,0.15) 0%, transparent 70%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(6,182,212,0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .hero {
    text-align: center;
    z-index: 1;
    padding: 2rem;
  }

  .badge {
    display: inline-block;
    background: rgba(124,58,237,0.15);
    border: 1px solid rgba(124,58,237,0.3);
    color: #a78bfa;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.4rem 1rem;
    border-radius: 999px;
    margin-bottom: 2rem;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(3rem, 8vw, 6rem);
    font-weight: 800;
    line-height: 1;
    margin-bottom: 1.5rem;
    background: linear-gradient(135deg, #f0f0f5 30%, #a78bfa 70%, #06b6d4 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    color: var(--muted);
    font-size: 1.2rem;
    font-weight: 300;
    max-width: 500px;
    margin: 0 auto 3rem;
    line-height: 1.6;
  }

  .steps {
    display: flex;
    gap: 1rem;
    justify-content: center;
    margin-bottom: 3rem;
    flex-wrap: wrap;
  }

  .step {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.9rem;
    color: var(--muted);
    transition: all 0.3s;
  }

  .step:hover { border-color: rgba(124,58,237,0.4); color: var(--text); }

  .step-num {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    color: white;
    flex-shrink: 0;
  }

  .btn-start {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    color: white;
    text-decoration: none;
    padding: 1.1rem 2.5rem;
    border-radius: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
    transition: all 0.3s;
    box-shadow: 0 0 40px rgba(124,58,237,0.3);
    border: none;
    cursor: pointer;
  }

  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 60px rgba(124,58,237,0.5);
  }

  .btn-start svg { width: 20px; height: 20px; }

  /* floating doodles */
  .doodle {
    position: fixed;
    opacity: 0.06;
    animation: float 6s ease-in-out infinite;
  }
  .doodle:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
  .doodle:nth-child(2) { top: 70%; right: 8%; animation-delay: 2s; }
  .doodle:nth-child(3) { top: 40%; left: 2%; animation-delay: 4s; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-20px) rotate(5deg); }
  }
</style>
</head>
<body>

<svg class="doodle" width="120" height="180" viewBox="0 0 120 180">
  <ellipse cx="60" cy="50" rx="35" ry="40" fill="none" stroke="white" stroke-width="3"/>
  <line x1="60" y1="90" x2="60" y2="140" stroke="white" stroke-width="3"/>
  <line x1="60" y1="105" x2="30" y2="125" stroke="white" stroke-width="3"/>
  <line x1="60" y1="105" x2="90" y2="125" stroke="white" stroke-width="3"/>
  <line x1="60" y1="140" x2="40" y2="170" stroke="white" stroke-width="3"/>
  <line x1="60" y1="140" x2="80" y2="170" stroke="white" stroke-width="3"/>
</svg>
<svg class="doodle" width="100" height="160" viewBox="0 0 100 160">
  <circle cx="50" cy="40" r="30" fill="none" stroke="white" stroke-width="3"/>
  <line x1="50" y1="70" x2="50" y2="120" stroke="white" stroke-width="3"/>
  <line x1="50" y1="90" x2="20" y2="110" stroke="white" stroke-width="3"/>
  <line x1="50" y1="90" x2="80" y2="110" stroke="white" stroke-width="3"/>
  <line x1="50" y1="120" x2="30" y2="150" stroke="white" stroke-width="3"/>
  <line x1="50" y1="120" x2="70" y2="150" stroke="white" stroke-width="3"/>
</svg>

<div class="hero">
  <div class="badge">✦ Robot Agent Studio</div>
  <h1>Bring Your<br>Drawing to Life</h1>
  <p class="subtitle">Draw a character, point the camera, and watch it dance.</p>

  <div class="steps">
    <div class="step">
      <div class="step-num">1</div>
      <span>Capture your drawing</span>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <span>Place the joints</span>
    </div>
    <div class="step">
      <div class="step-num">3</div>
      <span>Choose a dance</span>
    </div>
  </div>

  <a href="/capture" class="btn-start">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="3"/><path d="M20.94 11A8.994 8.994 0 0 0 12 3a8.994 8.994 0 0 0-8.94 8m1.06 2A8.994 8.994 0 0 0 12 21a8.994 8.994 0 0 0 8.94-8"/>
    </svg>
    Start Now
  </a>
</div>

</body>
</html>
