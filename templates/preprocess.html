<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Process Image</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--accent:#7c3aed;--text:#f0f0f5;--muted:#6b6b80;--card:#1a1a24;--card2:#13131a;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;padding:1.5rem 1rem;}
  .top{text-align:center;margin-bottom:1.5rem;}
  .step-indicator{display:flex;gap:.5rem;justify-content:center;margin-bottom:1rem;}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--muted);}
  .dot.done{background:#34d399;}.dot.active{background:var(--accent);width:24px;border-radius:4px;}
  h2{font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;}
  .sub{color:var(--muted);font-size:.9rem;margin-top:.3rem;}

  /* 4 panel grid */
  .panels{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;max-width:1600px;margin:0 auto;}
  .panel{background:var(--card);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:1rem;display:flex;flex-direction:column;gap:.8rem;}
  .panel-title{font-family:'Syne',sans-serif;font-size:.85rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;text-align:center;}
  .preview{width:100%;aspect-ratio:1;object-fit:contain;border-radius:10px;background:var(--card2);border:1px solid rgba(255,255,255,.04);}
  .preview-svg{width:100%;aspect-ratio:1;border-radius:10px;background:white;border:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .preview-svg img{width:100%;height:100%;object-fit:contain;}

  /* sliders */
  .slider-row{display:flex;flex-direction:column;gap:.2rem;}
  .slider-top{display:flex;justify-content:space-between;font-size:.75rem;}
  .slider-top span:first-child{color:var(--muted);}
  .slider-top span:last-child{color:#89b4fa;}
  input[type=range]{width:100%;accent-color:var(--accent);height:3px;}

  .radio-group{display:flex;flex-direction:column;gap:.3rem;}
  .radio-group label{font-size:.8rem;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:.4rem;padding:.3rem .5rem;border-radius:6px;}
  .radio-group label:hover{background:rgba(255,255,255,.04);color:var(--text);}
  .radio-group input{accent-color:var(--accent);}

  .invert-btn{width:100%;padding:.5rem;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--text);font-size:.82rem;cursor:pointer;transition:all .2s;}
  .invert-btn.active{background:#34d399;color:#0a0a0f;border-color:#34d399;}

  .render-btn{width:100%;padding:.5rem;border-radius:8px;border:1px solid rgba(124,58,237,.3);background:rgba(124,58,237,.1);color:#a78bfa;font-size:.82rem;cursor:pointer;transition:all .2s;}
  .render-btn:hover{background:rgba(124,58,237,.2);}

  .use-btn{width:100%;padding:.7rem;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#5b21b6);color:white;font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s;}
  .use-btn:hover{transform:translateY(-1px);box-shadow:0 0 20px rgba(124,58,237,.4);}

  .status-msg{font-size:.75rem;color:var(--muted);text-align:center;min-height:1rem;}
  .status-msg.ok{color:#34d399;} .status-msg.err{color:#f38ba8;}
  .spacer{flex:1;}
</style>
</head>
<body>
<div class="top">
  <div class="step-indicator">
    <div class="dot done"></div><div class="dot active"></div>
    <div class="dot"></div><div class="dot"></div>
  </div>
  <h2>🖼 Process Image</h2>
  <p class="sub">Choose which version to use for joint placement</p>
  <button onclick="location.href='/capture'" style="margin-top:.5rem;padding:.5rem 1.2rem;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--muted);font-family:'DM Sans',sans-serif;cursor:pointer;">← Back</button>
</div>

<div class="panels">

  <!-- PANEL 1: Original -->
  <div class="panel">
    <div class="panel-title">Original</div>
    <img class="preview" id="origImg" src="data:image/jpeg;base64,{{ image_b64 }}">
    <div class="spacer"></div>
    <button class="use-btn" onclick="usePanel('original')">Use Original →</button>
    <div class="status-msg" id="status-original"></div>
  </div>

  <!-- PANEL 2: Processed -->
  <div class="panel">
    <div class="panel-title">Processed</div>
    <img class="preview" id="procImg">

    <button class="invert-btn" id="invertBtn" onclick="toggleInvert()">⬛ Invert Colors</button>

    <div class="radio-group">
      <label><input type="radio" name="level" value="1"> L1 – Basic Threshold</label>
      <label><input type="radio" name="level" value="2"> L2 – Adaptive</label>
      <label><input type="radio" name="level" value="3" checked> L3 – Morph Removal</label>
    </div>

    <div class="slider-row">
      <div class="slider-top"><span>Threshold</span><span id="threshVal">127</span></div>
      <input type="range" min="0" max="255" value="127" oninput="sv(this,'threshVal');reqProc()">
    </div>
    <div class="slider-row">
      <div class="slider-top"><span>Block Size</span><span id="blockVal">11</span></div>
      <input type="range" min="3" max="99" value="11" step="2" oninput="sv(this,'blockVal');reqProc()">
    </div>
    <div class="slider-row">
      <div class="slider-top"><span>C Constant</span><span id="cVal">2</span></div>
      <input type="range" min="0" max="30" value="2" oninput="sv(this,'cVal');reqProc()">
    </div>
    <div class="slider-row">
      <div class="slider-top"><span>Morph Kernel</span><span id="morphVal">2</span></div>
      <input type="range" min="1" max="10" value="2" oninput="sv(this,'morphVal');reqProc()">
    </div>

    <button class="use-btn" onclick="usePanel('processed')">Use Processed →</button>
    <div class="status-msg" id="status-processed"></div>
  </div>

  <!-- PANEL 3: CV Trace -->
  <div class="panel">
    <div class="panel-title">CV Trace / Vector</div>
    <div class="preview-svg" id="cvBox"><span style="color:var(--muted);font-size:.8rem">Click Render</span></div>

    <button class="invert-btn" id="invertCvBtn" onclick="toggleInvertCV()">⬛ Invert CV</button>
    <div class="slider-row">
      <div class="slider-top"><span>Min Area</span><span id="cvMinVal">0</span></div>
      <input type="range" min="0" max="500" value="0" oninput="sv(this,'cvMinVal')">
    </div>
    <div class="slider-row">
      <div class="slider-top"><span>Max Area</span><span id="cvMaxVal">50000</span></div>
      <input type="range" min="1000" max="200000" value="50000" oninput="sv(this,'cvMaxVal')">
    </div>
    <div class="slider-row">
      <div class="slider-top"><span>Optimize</span><span id="cvOptVal">0.2</span></div>
      <input type="range" min="0" max="200" value="20" oninput="this.previousElementSibling.querySelector('span:last-child').textContent=document.getElementById('cvOptVal').textContent=+(parseInt(this.value)/100).toFixed(2)">
    </div>

    <button class="render-btn" onclick="renderCV()">▶ Render CV Trace</button>
    <div class="spacer"></div>
    <button class="use-btn" onclick="usePanel('cvtrace')">Use CV Trace →</button>
    <div class="status-msg" id="status-cvtrace"></div>
  </div>

  <!-- PANEL 4: Potrace -->
  <div class="panel">
    <div class="panel-title">Potrace / Vector</div>
    <div class="preview-svg" id="ptBox"><span style="color:var(--muted);font-size:.8rem">Click Render</span></div>

    <button class="invert-btn" id="invertPtBtn" onclick="toggleInvertPT()">⬛ Invert Potrace</button>
    <div class="slider-row">
      <div class="slider-top"><span>Turd Size</span><span id="ptTurdVal">500</span></div>
      <input type="range" min="0" max="2000" value="500" oninput="sv(this,'ptTurdVal')">
    </div>
    <div class="slider-row">
      <div class="slider-top"><span>Alpha Max</span><span id="ptAlphaVal">1.0</span></div>
      <input type="range" min="0" max="100" value="100" oninput="document.getElementById('ptAlphaVal').textContent=+(parseInt(this.value)/100).toFixed(2)">
    </div>
    <div class="slider-row">
      <div class="slider-top"><span>Opt Tolerance</span><span id="ptOptVal">0.2</span></div>
      <input type="range" min="0" max="200" value="20" oninput="document.getElementById('ptOptVal').textContent=+(parseInt(this.value)/100).toFixed(2)">
    </div>

    <button class="render-btn" onclick="renderPotrace()">▶ Render Potrace</button>
    <button class="render-btn" id="downloadPtBtn" onclick="downloadPotrace()" style="display:none">⬇ Download Potrace PNG</button>
    <div class="spacer"></div>
    <button class="use-btn" onclick="usePanel('potrace')">Use Potrace →</button>
    <div class="status-msg" id="status-potrace"></div>
  </div>

</div>

<script>
let inverted = false;
let procTimer = null;

let invertedCV = false;
let invertedPT = false;

function sv(el, id) {
  document.getElementById(id).textContent = el.value;
}

function toggleInvert() {
  inverted = !inverted;
  const btn = document.getElementById('invertBtn');
  btn.textContent = inverted ? '⬜ Invert Colors' : '⬛ Invert Colors';
  btn.classList.toggle('active', inverted);
  reqProc();
}

function toggleInvertCV() {
  invertedCV = !invertedCV;
  const btn = document.getElementById('invertCvBtn');
  btn.textContent = invertedCV ? '⬜ Invert CV' : '⬛ Invert CV';
  btn.classList.toggle('active', invertedCV);
}

function toggleInvertPT() {
  invertedPT = !invertedPT;
  const btn = document.getElementById('invertPtBtn');
  btn.textContent = invertedPT ? '⬜ Invert Potrace' : '⬛ Invert Potrace';
  btn.classList.toggle('active', invertedPT);
}

document.querySelectorAll('input[name=level]').forEach(r => r.addEventListener('change', reqProc));

function getProcParams() {
  return {
    level:        parseInt(document.querySelector('input[name=level]:checked').value),
    threshold:    parseInt(document.querySelector('#procImg').closest('.panel').querySelectorAll('input[type=range]')[0].value),
    block_size:   parseInt(document.querySelector('#procImg').closest('.panel').querySelectorAll('input[type=range]')[1].value),
    c_val:        parseInt(document.querySelector('#procImg').closest('.panel').querySelectorAll('input[type=range]')[2].value),
    morph_k:      parseInt(document.querySelector('#procImg').closest('.panel').querySelectorAll('input[type=range]')[3].value),
    proc_inverted: inverted   // ← renamed
  };
}

function downloadPotrace() {
    const img = document.querySelector('#ptBox img');
    if (!img) return;
    const a = document.createElement('a');
    a.href = img.src;
    a.download = 'potrace_preview.svg';
    a.click();
}

function reqProc() {
  clearTimeout(procTimer);
  procTimer = setTimeout(fetchProc, 150);
}

function fetchProc() {
  fetch('/api/preview_process', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify(getProcParams())
  }).then(r=>r.json()).then(d=>{
    document.getElementById('procImg').src = d.image;
  });
}

function renderCV() {
  const panel = document.getElementById('cvBox');
  const sliders = panel.closest('.panel').querySelectorAll('input[type=range]');
  panel.innerHTML = '<span style="color:var(--muted);font-size:.8rem">Rendering…</span>';
  fetch('/api/preview_cvtrace', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      ...getProcParams(),               // ← include processed params
      min_area: parseInt(sliders[0].value),
      max_area: parseInt(sliders[1].value),
      inverted: invertedCV,
      optimize: parseFloat(document.getElementById('cvOptVal').textContent)
    })
  }).then(r=>r.json()).then(d=>{
    panel.innerHTML = `<img src="${d.svg}" style="width:100%;height:100%;object-fit:contain;">`;
  });
}

function renderPotrace() {
  const panel = document.getElementById('ptBox');
  panel.innerHTML = '<span style="color:var(--muted);font-size:.8rem">Rendering…</span>';
  fetch('/api/preview_potrace', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      ...getProcParams(),               // ← include processed params
      turdsize:     parseInt(document.getElementById('ptTurdVal').textContent),
      alphamax:     parseFloat(document.getElementById('ptAlphaVal').textContent),
      inverted: invertedPT,
      opttolerance: parseFloat(document.getElementById('ptOptVal').textContent)
    })
  }).then(r=>r.json()).then(d=>{
    if(d.error){ panel.innerHTML=`<span style="color:#f38ba8;font-size:.75rem">${d.error}</span>`; return; }
    panel.innerHTML = `<img src="${d.svg}" style="width:100%;height:100%;object-fit:contain;">`;
    document.getElementById('downloadPtBtn').style.display = 'block';
  });
}

function usePanel(source) {
  const msg = document.getElementById('status-' + source);
  msg.textContent = 'Saving…'; msg.className = 'status-msg';
  
  let extra = {};
  if (source === 'cvtrace') {
    const sliders = document.getElementById('cvBox').closest('.panel').querySelectorAll('input[type=range]');
    extra = {
      inverted: invertedCV,
      min_area: parseInt(sliders[0].value),
      max_area: parseInt(sliders[1].value),
      optimize: parseFloat(document.getElementById('cvOptVal').textContent)
    };
  } else if (source === 'potrace') {
    extra = {
      inverted: invertedPT,
      turdsize:     parseInt(document.getElementById('ptTurdVal').textContent),
      alphamax:     parseFloat(document.getElementById('ptAlphaVal').textContent),
      opttolerance: parseFloat(document.getElementById('ptOptVal').textContent)
    };
  }

  fetch('/api/save_processed', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({source, ...getProcParams(), ...extra})
  }).then(r=>r.json()).then(d=>{
    if(d.success){
      msg.textContent = '✅ Redirecting…'; msg.className='status-msg ok';
      setTimeout(()=>location.href='/annotate', 600);
    } else {
      msg.textContent = '❌ '+d.error; msg.className='status-msg err';
    }
  });
}

// auto-load processed on start
fetchProc();
</script>
</body>
</html>
