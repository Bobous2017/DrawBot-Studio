<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Step 1 — Capture</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #13131a; --accent: #7c3aed;
    --accent2: #06b6d4; --text: #f0f0f5; --muted: #6b6b80; --card: #1a1a24;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 2rem;
  }

  .step-indicator {
    display: flex; gap: 0.5rem; margin-bottom: 2rem;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.active { background: var(--accent); width: 24px; border-radius: 4px; }

  h2 {
    font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
    margin-bottom: 0.5rem; text-align: center;
  }
  .sub { color: var(--muted); margin-bottom: 2rem; text-align: center; }

  .cam-wrap {
    position: relative; border-radius: 20px; overflow: hidden;
    border: 2px solid rgba(124,58,237,0.3);
    box-shadow: 0 0 60px rgba(124,58,237,0.15);
    margin-bottom: 1.5rem;
    max-width: 640px; width: 100%;
  }

  #video, #canvas { display: block; width: 100%; border-radius: 18px; }
  #canvas { display: none; }

  .countdown-overlay {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,10,15,0.7);
    font-family: 'Syne', sans-serif;
    font-size: 8rem; font-weight: 800;
    color: white; display: none;
  }

  .flash {
    position: absolute; inset: 0; background: white;
    border-radius: 18px; opacity: 0; pointer-events: none;
    transition: opacity 0.1s;
  }

  .controls { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }

  .btn {
    padding: 0.9rem 2rem; border-radius: 12px; border: none;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 0.5rem;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #5b21b6);
    color: white; box-shadow: 0 0 30px rgba(124,58,237,0.3);
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 50px rgba(124,58,237,0.5); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-ghost {
    background: rgba(255,255,255,0.05); color: var(--muted);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.08); }

  .status {
    margin-top: 1.5rem; text-align: center; color: var(--muted);
    font-size: 0.9rem; min-height: 1.5rem;
  }
  .status.success { color: #34d399; }
  .status.error { color: #f87171; }

  .tip {
    margin-top: 2rem; background: rgba(6,182,212,0.08);
    border: 1px solid rgba(6,182,212,0.2); border-radius: 12px;
    padding: 1rem 1.25rem; font-size: 0.85rem; color: #67e8f9;
    max-width: 500px; text-align: center;
  }
</style>
</head>
<body>

<div class="step-indicator">
  <div class="dot active"></div>
  <div class="dot"></div>
  <div class="dot"></div>
</div>

<h2>📸 Capture Your Drawing</h2>
<p class="sub">Hold your drawing up to the camera, then press Capture</p>

<div class="cam-wrap">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
  <div class="countdown-overlay" id="countdown"></div>
  <div class="flash" id="flash"></div>
</div>

<div class="controls">
  <button class="btn btn-ghost" onclick="history.back()">← Back</button>
  <button class="btn btn-primary" id="captureBtn" onclick="startCountdown()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="3"/><path d="M20 7h-3.5l-1.5-2H9L7.5 7H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h16a1 1 0 0 0 1-1V8a1 1 0 0 0-1-1Z"/>
    </svg>
    Capture (5s countdown)
  </button>
</div>

<div class="status" id="status"></div>

<div class="tip">
  💡 Make sure the drawing is on a <strong>white background</strong>, arms and legs don't overlap the body, and the paper is flat.
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const countdownEl = document.getElementById('countdown');
const flashEl = document.getElementById('flash');
const statusEl = document.getElementById('status');
const captureBtn = document.getElementById('captureBtn');

// Start webcam
navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } })
  .then(stream => { video.srcObject = stream; })
  .catch(e => { statusEl.textContent = 'Camera error: ' + e.message; statusEl.className = 'status error'; });

function startCountdown() {
  captureBtn.disabled = true;
  let count = 5;
  countdownEl.style.display = 'flex';
  countdownEl.textContent = count;

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      countdownEl.textContent = count;
    } else {
      clearInterval(interval);
      countdownEl.textContent = '📸';
      setTimeout(() => {
        capturePhoto();
        countdownEl.style.display = 'none';
      }, 300);
    }
  }, 1000);
}

function capturePhoto() {
  // flash effect
  flashEl.style.opacity = '1';
  setTimeout(() => flashEl.style.opacity = '0', 150);

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const imageData = canvas.toDataURL('image/jpeg', 0.92);

  statusEl.textContent = 'Processing…';
  statusEl.className = 'status';

  fetch('/api/save_capture', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ image: imageData })
  })
  .then(r => r.json())
  .then(data => {
    if (data.success) {
      statusEl.textContent = '✅ Captured! Redirecting…';
      statusEl.className = 'status success';
      setTimeout(() => window.location.href = '/annotate', 800);
    } else {
      statusEl.textContent = 'Error: ' + data.error;
      statusEl.className = 'status error';
      captureBtn.disabled = false;
    }
  });
}
</script>
</body>
</html>
